services:
  db:
    image: postgres:16
    container_name: scheduler_db
    environment:
      POSTGRES_USER: scheduler
      POSTGRES_PASSWORD: scheduler
      POSTGRES_DB: scheduler
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scheduler -d scheduler"]
      interval: 5s
      timeout: 5s
      retries: 10

  db_test:
    image: postgres:16
    container_name: scheduler_db_test
    environment:
      POSTGRES_USER: scheduler
      POSTGRES_PASSWORD: scheduler
      POSTGRES_DB: scheduler_test
    ports:
      - "5433:5432"
    tmpfs:
      # Ephemeral: test DB lives in RAM, wiped on restart, fast truncation.
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scheduler -d scheduler_test"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
